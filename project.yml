name: NightTracker
options:
  bundleIdPrefix: com.nighttracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "L9LZXWJR6K"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
targets:
  NightTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NightTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anonymous.baby-night-wakeup-tracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
  NightTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NightTrackerTests
    dependencies:
      - target: NightTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nighttracker.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  NightTracker:
    build:
      targets:
        NightTracker: all
        NightTrackerTests: [test]
    test:
      targets:
        - NightTrackerTests
      gatherCoverageData: false
